  <text x="80" y="410" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">reviewer: [OPS] -&gt; read_file {"path":"tool_bash.py"}</text>
  <text x="80" y="440" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">reviewer: [OPS] &lt;- found 3 potential command-injection risks</text>
  <text x="80" y="470" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">nanoAgent: Summarizing findings first, then processing the next queued request.</text>

  <rect x="60" y="586" width="1080" height="52" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="80" y="620" fill="#94a3b8" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">> Use /agents for status; use /clear to clear the chat</text>
