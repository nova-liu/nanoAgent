  <text x="60" y="130" fill="#f8fafc" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">[T] nanoAgent(leader) thinking q=2  [I] reviewer(code-review)</text>

  <rect x="60" y="170" width="580" height="56" rx="10" fill="#183026"/>
  <text x="80" y="205" fill="#dcfce7" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">user-A: Review tool_bash.py security risks</text>

  <rect x="60" y="240" width="640" height="56" rx="10" fill="#183026"/>
  <text x="80" y="275" fill="#dcfce7" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">user-B: Also review read_file boundary checks</text>

  <rect x="60" y="312" width="810" height="46" rx="10" fill="#1f2937"/>
  <text x="80" y="342" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">[SYS] nanoAgent is thinking, queued at position 2</text>

